name: Test PR

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: test (${{ matrix.db_mode }})

    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        db_mode: [none, sqlite]

    env:
      APP_NAME: helloworld
      DB_MODE: ${{ matrix.db_mode }}
      DB_FILE_NAME: /tmp/dtrw-template-${{ matrix.db_mode }}.db

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Build
        run: yarn build
